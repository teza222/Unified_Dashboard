<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamaica Geospatial Intelligence | Bootstrap</title>
    
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
   
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    
    <script src="https://api.mqcdn.com/sdk/mapquest-js/v1.3.2/mapquest.js"></script>
    <link type="text/css" rel="stylesheet" href="https://api.mqcdn.com/sdk/mapquest-js/v1.3.2/mapquest.css"/>
    
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    
  <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-12">
                
               
                <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                <h5 class="mb-0">
                  <i class="bi bi-search"></i> Search Location
                </h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-pin-map"></i>
                                    </span>
                                    <input type="text" 
                                           class="form-control form-control-lg" 
                                           id="searchBox" 
                                           placeholder="Search for a location in Jamaica...">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="d-grid gap-2 d-md-flex">
                                    <button class="btn btn-primary btn-lg w-100" id="searchButton">
                                        <i class="bi bi-search"></i> Search
                                    </button>
                                    <button class="btn btn-success btn-lg w-100" onclick="resetToJamaica()">
                                        <i class="bi bi-repeat"></i> Reset
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        
                      <div class="mt-3">
                            <small class="text-muted">Popular Destinations:</small>
                            <div class="d-flex flex-wrap gap-2 mt-2">
                                <button class="btn btn-outline-primary btn-sm quick-search">
                                    <i class="bi bi-pin-map"></i> Kingston
                                </button>
                            
                                <button class="btn btn-outline-primary btn-sm quick-search">
                                    <i class="bi bi-pin-map"></i> Ocho Rios
                                </button>
                                <button class="btn btn-outline-primary btn-sm quick-search">
                                    <i class="bi bi-pin-map"></i> Negril
                                </button>
                                <button class="btn btn-outline-primary btn-sm quick-search">
                                    <i class="bi bi-pin-map"></i> Port Antonio
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
               
                <div class="card shadow-lg">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">
                            <i class="bi bi-map-fill"></i> Interactive Map
                        </h5>
                        <span class="badge bg-success" id="locationBadge">
                            <i class="bi bi-geo-alt"></i> Jamaica
                        </span>
                    </div>
                    <div class="card-body p-0">
                        <div id="map"></div>
                    </div>
            </div>
        </div>
    </div>
    
   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
