<!DOCTYPE html>
<html>
<head>
    <title>Jamaica Geospatial Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://api.mqcdn.com/sdk/mapquest-js/v1.3.2/mapquest.js"></script>
    <link rel="stylesheet" href="https://api.mqcdn.com/sdk/mapquest-js/v1.3.2/mapquest.css"/>
</head>
<body>
    <h1>🇯🇲 Jamaica Geospatial Intelligence</h1>
    
    <div class="search-container">
        <input type="text" id="searchBox" placeholder="Search anywhere in Jamaica or the world...">
        <button id="searchButton">🔍 Search Location</button>
    </div>
    
    <div id="map"></div>
    
    <div class="info-bar">
        <span>📍 Default View: Jamaica | Try: Kingston, Montego Bay, Ocho Rios, Negril</span>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
