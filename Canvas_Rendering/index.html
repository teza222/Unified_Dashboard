<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Clock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        body.day-mode {
            background: linear-gradient(135deg, #dedede 0%, #ffffff 50%, #ffffff 100%);
        }

        body.night-mode {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #000000 100%);
        }

        canvas {
            border-radius: 50%;
        }

        body.day-mode .mode-toggle {
            background-color: #3553ff;
        }

        body.night-mode .mode-toggle {
            background-color: #4ecdc4;
            color: #000000;
        }
    </style>
</head>
<body class="day-mode d-flex justify-content-center align-items-center vh-100">
    <div class="text-center">
        <h1 class="display-4 text-primary fw-bold mb-5">Analog Clock</h1>
        
        <div class="mb-5 shadow-lg" style="display: inline-block; border-radius: 50%;">
            <canvas id="clockCanvas" width="400" height="400"></canvas>
        </div>

        <div>
            <button class="mode-toggle btn btn-lg px-5 py-3 fw-bold text-white" id="modeToggle"> Night Mode</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
