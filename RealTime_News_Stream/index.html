<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Real Time News</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Format image preview -->
  <style>
    .card-img-top {
      height: 200px;      
      width: 100%;         
      object-fit: cover;   
    }
  </style>
</head>

<body>
  <div class="container my-4">
    <h1 class="text-center mb-4">Real-Time News Stream</h1>

    <!-- Search Bar -->
    <div class="input-group mb-3">
      <input type="text" id="searchInput" class="form-control" placeholder="Search articles...">
      <button id="searchBtn" class="btn btn-primary">Search</button>
    </div>

    <!-- Loading Spinner -->
    <div id="spinner" class="text-center my-4 d-none">
      <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;"></div>
      <p>Loading...</p>
    </div>
    
    <!-- Results Grid -->
    <div id="results" class="row"></div> 
  </div>

  <script src="../config.js"></script>
  <script src="script.js"></script>
</body>
</html>
