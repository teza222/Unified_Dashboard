<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>On-Demand Media Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        .video-container { max-width: 800px; margin: 0 auto; }
        .result-card { cursor: pointer; transition: transform .15s ease-in-out; }
        .result-card:hover { transform: translateY(-3px); }
        .card-img-top { object-fit: cover; height: 180px; }
    </style>
</head>
<body class="bg-dark text-light">
    <div class="container py-4">
        <div class="card bg-secondary bg-opacity-50 border-0 shadow-sm">
            <div class="card-body">
                <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
                    
                    <form id="searchForm" class="w-100 w-md-auto">
                        <div class="input-group">
                            <input id="searchInput" type="search" class="form-control" placeholder="Search for videos..." required>
                            <button type="submit" class="btn btn-danger">Search</button>
                        </div>
                    </form>
                </div>

                <div class="mt-4">
                    <div class="video-container">
                        <div class="ratio ratio-16x9 rounded overflow-hidden shadow-sm">
                            <iframe id="videoPlayer" class="border-0" src="https://www.youtube.com/embed/JPXRM00tZKE?si=I5PR8Hbop0LmzUDk" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
                        </div>
                    </div>
                    <div id="status" class="mt-3 alert alert-secondary text-dark">Enter a topic and click search to load video thumbnails.</div>
                    <div id="results" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3 mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
